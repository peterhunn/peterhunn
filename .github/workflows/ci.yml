name: CI
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build protocol
        run: npm run build --workspace=packages/protocol
      - name: Test protocol
        run: npm test --workspace=packages/protocol
      - name: Build agents
        run: npm run build --workspace=packages/agents
      - name: Test agents
        run: npm test --workspace=packages/agents
      - name: Build mcp
        run: npm run build --workspace=packages/mcp
      - name: Test mcp
        run: npm test --workspace=packages/mcp
      - name: Build api
        run: |
          rm -rf packages/api/dist
          cd packages/api && npx tsc
      - name: Test api
        run: cd packages/api && npm test
      - name: Build facilitator
        run: npm run build --workspace=packages/facilitator
      - name: Test facilitator
        run: npm test --workspace=packages/facilitator
      - name: Build x402
        run: npm run build --workspace=packages/x402
      - name: Test x402
        run: npm test --workspace=packages/x402
      - name: Build dashboard
        run: npm run build --workspace=packages/dashboard

  test-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Python SDK
        working-directory: packages/python
        run: python -m pip install -e ".[dev]"
      - name: Test Python SDK
        working-directory: packages/python
        run: python -m pytest tests/ -v
