name: CI
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - run: npm ci
      - name: Build protocol
        run: npm run build --workspace=packages/protocol
      - name: Test protocol
        run: npm test --workspace=packages/protocol
      - name: Build agents
        run: npm run build --workspace=packages/agents
      - name: Test agents
        run: npm test --workspace=packages/agents
      - name: Build facilitator
        run: npm run build --workspace=packages/facilitator
      - name: Test facilitator
        run: npm test --workspace=packages/facilitator
      - name: Build dashboard
        run: npm run build --workspace=packages/dashboard
