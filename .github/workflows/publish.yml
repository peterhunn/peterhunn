# Requires NPM_TOKEN secret in GitHub repo settings (Settings → Secrets → Actions)
name: Publish
on:
  push:
    tags:
      - "v*.*.*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # for npm provenance
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"
      - run: npm ci
      - name: Build protocol
        run: npm run build --workspace=packages/protocol
      - name: Test protocol
        run: npm test --workspace=packages/protocol
      - name: Publish @x490/protocol
        run: npm publish --workspace=packages/protocol --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Build agents
        run: npm run build --workspace=packages/agents
      - name: Test agents
        run: npm test --workspace=packages/agents
      - name: Publish @x490/agents
        run: npm publish --workspace=packages/agents --access=public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
