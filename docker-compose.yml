version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: x490
      POSTGRES_USER: x490
      POSTGRES_PASSWORD: x490
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/facilitator/src/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U x490"]
      interval: 5s
      timeout: 3s
      retries: 5

  facilitator:
    build:
      context: .
      dockerfile: packages/facilitator/Dockerfile
    ports:
      - "4901:4901"
    environment:
      PORT: "4901"
      BASE_URL: "http://localhost:4901"
      DATABASE_URL: "postgres://x490:x490@postgres:5432/x490"
      AUTH0_DOMAIN: "${AUTH0_DOMAIN:-}"
      AUTH0_AUDIENCE: "${AUTH0_AUDIENCE:-}"
    depends_on:
      postgres:
        condition: service_healthy

  dashboard:
    build:
      context: .
      dockerfile: packages/dashboard/Dockerfile
    ports:
      - "3001:3001"
    environment:
      FACILITATOR_URL: "http://facilitator:4901"
      AUTH0_SECRET: "${AUTH0_SECRET}"
      AUTH0_BASE_URL: "${AUTH0_BASE_URL:-http://localhost:3001}"
      AUTH0_ISSUER_BASE_URL: "${AUTH0_ISSUER_BASE_URL}"
      AUTH0_CLIENT_ID: "${AUTH0_CLIENT_ID}"
      AUTH0_CLIENT_SECRET: "${AUTH0_CLIENT_SECRET}"
      AUTH0_AUDIENCE: "${AUTH0_AUDIENCE:-}"
    depends_on:
      - facilitator

volumes:
  pgdata:
