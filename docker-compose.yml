version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: x490
      POSTGRES_USER: x490
      POSTGRES_PASSWORD: x490
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./packages/facilitator/src/schema.sql:/docker-entrypoint-initdb.d/schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U x490"]
      interval: 5s
      timeout: 3s
      retries: 5

  facilitator:
    build:
      context: .
      dockerfile: packages/facilitator/Dockerfile
    ports:
      - "4901:4901"
    environment:
      PORT: "4901"
      BASE_URL: "http://localhost:4901"
      DATABASE_URL: "postgres://x490:x490@postgres:5432/x490"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
