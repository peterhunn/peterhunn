[project]
name = "x490"
version = "0.1.0"
description = "Python client and server middleware for the x490 HTTP contracting protocol"
requires-python = ">=3.11"
dependencies = ["httpx>=0.27"]

[project.optional-dependencies]
starlette = ["starlette>=0.40"]
langchain = ["langchain-core>=0.2"]
dev = ["pytest>=8", "pytest-asyncio>=0.23", "httpx>=0.27", "starlette>=0.40", "langchain-core>=0.2", "pydantic>=2"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
